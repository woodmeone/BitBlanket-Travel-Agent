[tool.pytest.ini_options]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --strict-markers"
cache_dir = ".cache/pytest"
markers = [
  "unit: fast deterministic unit tests.",
  "integration: cross-module or ASGI integration tests.",
  "local: tests that rely on local runtime assets or local ASGI bootstrapping.",
  "external_api: tests that require an externally running API at localhost:38000.",
  "quality: tests for benchmark/golden/replay/quality-gate scripts.",
]
filterwarnings = [
  "ignore:Core Pydantic V1 functionality isn't compatible with Python 3\\.14 or greater\\.:UserWarning",
  "ignore::DeprecationWarning",
  "ignore::PendingDeprecationWarning",
]

[tool.mypy]
python_version = "3.13"
pretty = true
show_error_codes = true
warn_unused_configs = true
ignore_missing_imports = true
follow_imports = "silent"
check_untyped_defs = true
no_implicit_optional = true
explicit_package_bases = true
cache_dir = ".cache/mypy"

[tool.ruff]
target-version = "py313"
line-length = 100
cache-dir = ".cache/ruff"
extend-exclude = [
  ".cache",
  ".venv",
  "artifacts",
  "data",
  "docs/benchmarks",
  "frontend",
]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]
