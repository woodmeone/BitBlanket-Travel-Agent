groups:
  - name: moyuan-web-availability
    rules:
      - alert: MoyuanReadinessDown
        expr: max_over_time(moyuan_readiness_state[5m]) < 1
        for: 5m
        labels:
          severity: critical
          service: moyuan-web
        annotations:
          summary: moyuan-travel-agent readiness is failing
          description: Readiness has been below 1 for at least 5 minutes.

      - alert: MoyuanHttp5xxSpike
        expr: sum(rate(moyuan_http_requests_total{status=~"5.."}[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
          service: moyuan-web
        annotations:
          summary: HTTP 5xx rate is elevated
          description: The API is returning a sustained level of 5xx responses.

      - alert: MoyuanChatStreamFailures
        expr: sum(rate(moyuan_chat_stream_requests_total{outcome="error"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
          service: moyuan-web
        annotations:
          summary: Chat stream failures detected
          description: One or more chat stream requests ended with outcome=error in the last 10 minutes.

      - alert: MoyuanSseEventStall
        expr: sum(rate(moyuan_sse_events_total[15m])) == 0
        for: 15m
        labels:
          severity: warning
          service: moyuan-web
        annotations:
          summary: SSE event pipeline is idle
          description: No SSE events were emitted for 15 minutes; investigate stream delivery or request volume.

      - alert: MoyuanHttpTimeoutSpike
        expr: sum(rate(moyuan_http_timeouts_total[10m])) > 0
        for: 10m
        labels:
          severity: warning
          service: moyuan-web
        annotations:
          summary: HTTP timeout responses detected
          description: One or more requests exceeded timeout middleware thresholds in the last 10 minutes.
