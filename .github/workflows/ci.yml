name: CI

on:
  push:
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare runtime config for CI
        run: |
          cp config/llm_config.yaml.example config/llm_config.yaml
          cp config/server_config.yaml.example config/server_config.yaml

      - name: Run backend unit tests
        run: pytest tests -m "unit and not local and not external_api" -q

      - name: Run backend local smoke tests
        run: pytest tests -m "local and not external_api" -q

      - name: Run docstring audit
        run: python scripts/docstring_audit.py --strict

      - name: Run complexity budget gate
        run: python scripts/complexity_budget.py --strict

      - name: Run decision record audit
        run: python scripts/decision_record_audit.py --strict

      - name: Run skills market audit
        run: python scripts/skills_market_audit.py --strict

      - name: Run runtime contract audit
        run: python scripts/runtime_contract_audit.py --strict

      - name: Run Ruff static checks
        run: |
          ruff check --config ruff.toml \
            scripts/dev.py \
            scripts/bootstrap.py \
            scripts/export_openapi_snapshot.py \
            scripts/export_runtime_doctor_snapshot.py \
            scripts/export_release_manifest.py \
            scripts/release_harness_scorecard.py \
            scripts/runtime_contract_audit.py \
            scripts/runtime_ops_contracts.py \
            scripts/skills_market_audit.py \
            scripts/export_support_bundle.py \
            scripts/export_sse_contract_snapshot.py \
            scripts/runtime_backup.py \
            scripts/runtime_data_utils.py \
            scripts/runtime_doctor.py \
            scripts/runtime_prune.py \
            scripts/runtime_restore.py \
            web/moyuan_web/app_meta.py \
            web/moyuan_web/main.py \
            web/moyuan_web/middleware/__init__.py \
            web/moyuan_web/observability.py \
            web/moyuan_web/routes/chat.py \
            web/moyuan_web/routes/health.py \
            web/moyuan_web/services/share_service.py \
            web/moyuan_web/startup_checks.py

      - name: Run mypy static checks
        run: |
          mypy --config-file mypy.ini \
            scripts/dev.py \
            scripts/bootstrap.py \
            scripts/export_openapi_snapshot.py \
            scripts/export_runtime_doctor_snapshot.py \
            scripts/export_release_manifest.py \
            scripts/release_harness_scorecard.py \
            scripts/runtime_contract_audit.py \
            scripts/runtime_ops_contracts.py \
            scripts/skills_market_audit.py \
            scripts/export_support_bundle.py \
            scripts/export_sse_contract_snapshot.py \
            scripts/runtime_backup.py \
            scripts/runtime_data_utils.py \
            scripts/runtime_doctor.py \
            scripts/runtime_prune.py \
            scripts/runtime_restore.py \
            web/moyuan_web/app_meta.py \
            web/moyuan_web/main.py \
            web/moyuan_web/middleware/__init__.py \
            web/moyuan_web/observability.py \
            web/moyuan_web/routes/chat.py \
            web/moyuan_web/routes/health.py \
            web/moyuan_web/services/share_service.py \
            web/moyuan_web/startup_checks.py

      - name: Run pip-audit
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          mkdir -p artifacts/ci
          pip-audit -r requirements.txt --format json --output artifacts/ci/pip-audit-report.json

      - name: Run secret scan
        run: |
          mkdir -p artifacts/ci
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.24.2 \
            dir /repo --config /repo/.gitleaks.toml --no-banner --redact \
            --report-format json --report-path /repo/artifacts/ci/gitleaks-report.json

      - name: Export OpenAPI snapshot
        run: python scripts/export_openapi_snapshot.py

      - name: Verify OpenAPI snapshot is up to date
        run: git diff --exit-code -- docs/reference/openapi.snapshot.json

      - name: Export SSE contract snapshot
        run: python scripts/export_sse_contract_snapshot.py

      - name: Verify SSE contract snapshot is up to date
        run: git diff --exit-code -- docs/reference/sse-contract.snapshot.json

      - name: Export runtime doctor snapshot
        run: python scripts/export_runtime_doctor_snapshot.py

      - name: Verify runtime doctor snapshot is up to date
        run: git diff --exit-code -- docs/reference/runtime-doctor.snapshot.json

      - name: Run benchmark report
        run: python scripts/agent_benchmark.py --output-dir docs/benchmarks

      - name: Run golden report
        run: python scripts/agent_golden_eval.py --dataset tests/golden/agent_react_golden.json --report docs/benchmarks/agent_golden_eval_latest.json --min-pass-rate 0.0

      - name: Run release harness scorecard
        run: python scripts/release_harness_scorecard.py --strict

      - name: Run benchmark trend report
        run: python scripts/agent_benchmark_trend.py --current docs/benchmarks/agent_benchmark_latest.json --baseline docs/benchmarks/agent_benchmark_baseline.json --output docs/benchmarks/agent_benchmark_trend_latest.md

      - name: Run quality gate
        run: |
          python scripts/agent_quality_gate.py \
            --golden-report docs/benchmarks/agent_golden_eval_latest.json \
            --benchmark-report docs/benchmarks/agent_benchmark_latest.json \
            --baseline-benchmark-report docs/benchmarks/agent_benchmark_baseline.json \
            --min-golden-pass-rate 0.96 \
            --max-golden-hallucination-rate 0.05 \
            --min-benchmark-success-rate 0.60 \
            --max-benchmark-hallucination-rate 0.05 \
            --max-benchmark-fallback-steps-total 5 \
            --max-success-rate-regression 0.05 \
            --max-hallucination-rate-regression 0.02 \
            --max-fallback-steps-regression 2

      - name: Upload backend quality artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-artifacts
          path: |
            artifacts/ci/pip-audit-report.json
            artifacts/ci/gitleaks-report.json
            docs/benchmarks/agent_benchmark_latest.json
            docs/benchmarks/agent_benchmark_latest.md
            docs/benchmarks/agent_benchmark_trend_latest.md
            docs/benchmarks/agent_golden_eval_latest.json
            docs/benchmarks/agent_subagent_scorecard_latest.json
            docs/benchmarks/agent_subagent_scorecard_latest.md
            docs/benchmarks/release_harness_scorecard_latest.json
            docs/benchmarks/release_harness_scorecard_latest.md

      - name: Publish backend quality summary
        run: |
          {
            echo "## Backend Quality Summary"
            echo ""
            echo "- Unit tests: \`pytest tests -m \"unit and not local and not external_api\" -q\`"
            echo "- Local smoke tests: \`pytest tests -m \"local and not external_api\" -q\`"
            echo "- Docstring audit: \`python scripts/docstring_audit.py --strict\`"
            echo "- Complexity budget gate: \`python scripts/complexity_budget.py --strict\`"
            echo "- Decision record audit: \`python scripts/decision_record_audit.py --strict\`"
            echo "- Skills market audit: \`python scripts/skills_market_audit.py --strict\`"
            echo "- Runtime contract audit: \`python scripts/runtime_contract_audit.py --strict\`"
            echo "- Ruff: \`ruff check --config ruff.toml ...\`"
            echo "- mypy: \`mypy --config-file mypy.ini ...\`"
            echo "- Dependency audit: \`pip-audit -r requirements.txt\`"
            echo "- Secret scan: \`gitleaks dir /repo --config /repo/.gitleaks.toml\`"
            echo "- OpenAPI snapshot: \`docs/reference/openapi.snapshot.json\`"
            echo "- SSE snapshot: \`docs/reference/sse-contract.snapshot.json\`"
            echo "- Runtime doctor snapshot: \`docs/reference/runtime-doctor.snapshot.json\`"
            echo "- Support bundle script: \`python scripts/export_support_bundle.py\`"
            echo "- Benchmark report: \`docs/benchmarks/agent_benchmark_latest.md\`"
            echo "- Trend report: \`docs/benchmarks/agent_benchmark_trend_latest.md\`"
            echo "- Golden eval: \`docs/benchmarks/agent_golden_eval_latest.json\`"
            echo "- Subagent scorecard: \`docs/benchmarks/agent_subagent_scorecard_latest.md\`"
            echo "- Release harness scorecard: \`docs/benchmarks/release_harness_scorecard_latest.md\`"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Run unit tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

      - name: Publish frontend summary
        run: |
          {
            echo "## Frontend Quality Summary"
            echo ""
            echo "- Type check: \`npm run lint\`"
            echo "- Unit tests: \`npm run test:run\`"
            echo "- Build: \`npm run build\`"
          } >> "$GITHUB_STEP_SUMMARY"

  container-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Export release manifest
        run: |
          python scripts/export_release_manifest.py \
            --git-sha "${{ github.sha }}" \
            --git-ref "${{ github.ref_name }}" \
            --owner "${{ github.repository_owner }}"

      - name: Validate default compose config
        run: |
          mkdir -p artifacts/ci
          docker compose config > artifacts/ci/compose-default.rendered.yaml

      - name: Validate observability compose config
        run: docker compose --profile observability config > artifacts/ci/compose-observability.rendered.yaml

      - name: Build backend image smoke
        run: |
          docker build \
            --file Dockerfile.backend \
            --build-arg APP_BUILD_SHA="${{ github.sha }}" \
            --build-arg APP_BUILD_CREATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --tag moyuan-backend:ci .

      - name: Build frontend image smoke
        run: |
          docker build \
            --file frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE=http://localhost:38000 \
            --build-arg INTERNAL_API_BASE=http://backend:38000 \
            --build-arg APP_BUILD_SHA="${{ github.sha }}" \
            --build-arg APP_BUILD_CREATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --tag moyuan-frontend:ci ./frontend

      - name: Upload deployment validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-validation-artifacts
          path: |
            artifacts/ci/compose-default.rendered.yaml
            artifacts/ci/compose-observability.rendered.yaml
            artifacts/release/release-manifest.json

      - name: Publish deployment summary
        run: |
          {
            echo "## Deployment Validation Summary"
            echo ""
            echo "- Release manifest: \`artifacts/release/release-manifest.json\`"
            echo "- Default compose render: \`artifacts/ci/compose-default.rendered.yaml\`"
            echo "- Observability compose render: \`artifacts/ci/compose-observability.rendered.yaml\`"
            echo "- Backend image smoke: \`docker build -f Dockerfile.backend .\`"
            echo "- Frontend image smoke: \`docker build -f frontend/Dockerfile ./frontend\`"
          } >> "$GITHUB_STEP_SUMMARY"
