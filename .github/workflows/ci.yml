name: CI

on:
  push:
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare runtime config for CI
        run: |
          cp backend/config/llm_config.yaml.example backend/config/llm_config.yaml
          cp backend/config/server_config.yaml.example backend/config/server_config.yaml

      - name: Run backend unit tests
        run: python scripts/dev.py backend-test --pytest-slice unit

      - name: Run backend local smoke tests
        run: python scripts/dev.py backend-test --pytest-slice local

      - name: Run docstring audit
        run: python scripts/dev.py docstring

      - name: Run complexity budget gate
        run: python scripts/dev.py complexity

      - name: Run decision record audit
        run: python scripts/dev.py decision-records

      - name: Run skills market audit
        run: python scripts/dev.py skills-market

      - name: Run runtime contract audit
        run: python scripts/dev.py runtime-contracts

      - name: Run Ruff static checks
        run: python scripts/dev.py ruff

      - name: Run mypy static checks
        run: python scripts/dev.py mypy

      - name: Run pip-audit
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          mkdir -p artifacts/ci
          pip-audit -r requirements.txt --format json --output artifacts/ci/pip-audit-report.json

      - name: Run secret scan
        run: |
          mkdir -p artifacts/ci
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.24.2 \
            dir /repo --config /repo/deploy/security/gitleaks.toml --no-banner --redact \
            --report-format json --report-path /repo/artifacts/ci/gitleaks-report.json

      - name: Export contract snapshots
        run: python scripts/dev.py snapshots

      - name: Verify OpenAPI snapshot is up to date
        run: git diff --exit-code -- docs/reference/openapi.snapshot.json

      - name: Verify SSE contract snapshot is up to date
        run: git diff --exit-code -- docs/reference/sse-contract.snapshot.json

      - name: Verify runtime doctor snapshot is up to date
        run: git diff --exit-code -- docs/reference/runtime-doctor.snapshot.json

      - name: Run benchmark report
        run: python scripts/dev.py benchmark-report

      - name: Run golden report
        run: python scripts/dev.py golden-report

      - name: Run release harness scorecard
        run: python scripts/dev.py release-scorecard

      - name: Run benchmark trend report
        run: python scripts/dev.py benchmark-trend

      - name: Run quality gate
        run: python scripts/dev.py quality-gate

      - name: Upload backend quality artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-artifacts
          path: |
            artifacts/ci/pip-audit-report.json
            artifacts/ci/gitleaks-report.json
            docs/benchmarks/agent_benchmark_latest.json
            docs/benchmarks/agent_benchmark_latest.md
            docs/benchmarks/agent_benchmark_trend_latest.md
            docs/benchmarks/agent_golden_eval_latest.json
            docs/benchmarks/agent_subagent_scorecard_latest.json
            docs/benchmarks/agent_subagent_scorecard_latest.md
            docs/benchmarks/release_harness_scorecard_latest.json
            docs/benchmarks/release_harness_scorecard_latest.md

      - name: Publish backend quality summary
        run: |
          {
            echo "## Backend Quality Summary"
            echo ""
            echo "- Unit tests: \`python scripts/dev.py backend-test --pytest-slice unit\`"
            echo "- Local smoke tests: \`python scripts/dev.py backend-test --pytest-slice local\`"
            echo "- Docstring audit: \`python scripts/dev.py docstring\`"
            echo "- Complexity budget gate: \`python scripts/dev.py complexity\`"
            echo "- Decision record audit: \`python scripts/dev.py decision-records\`"
            echo "- Skills market audit: \`python scripts/dev.py skills-market\`"
            echo "- Runtime contract audit: \`python scripts/dev.py runtime-contracts\`"
            echo "- Ruff: \`python scripts/dev.py ruff\`"
            echo "- mypy: \`python scripts/dev.py mypy\`"
            echo "- Dependency audit: \`pip-audit -r requirements.txt\`"
            echo "- Secret scan: \`gitleaks dir /repo --config /repo/deploy/security/gitleaks.toml\`"
            echo "- Contract snapshots: \`python scripts/dev.py snapshots\`"
            echo "- OpenAPI snapshot: \`docs/reference/openapi.snapshot.json\`"
            echo "- SSE snapshot: \`docs/reference/sse-contract.snapshot.json\`"
            echo "- Runtime doctor snapshot: \`docs/reference/runtime-doctor.snapshot.json\`"
            echo "- Support bundle script: \`python scripts/dev.py support-bundle\`"
            echo "- Benchmark report: \`python scripts/dev.py benchmark-report\`"
            echo "- Trend report: \`python scripts/dev.py benchmark-trend\`"
            echo "- Golden eval: \`python scripts/dev.py golden-report\`"
            echo "- Subagent scorecard: \`docs/benchmarks/agent_subagent_scorecard_latest.md\`"
            echo "- Release harness scorecard: \`python scripts/dev.py release-scorecard\`"
            echo "- Quality gate: \`python scripts/dev.py quality-gate\`"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Run unit tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

      - name: Publish frontend summary
        run: |
          {
            echo "## Frontend Quality Summary"
            echo ""
            echo "- Type check: \`npm run lint\`"
            echo "- Unit tests: \`npm run test:run\`"
            echo "- Build: \`npm run build\`"
          } >> "$GITHUB_STEP_SUMMARY"

  container-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Export release manifest
        run: |
          python scripts/dev.py release-manifest \
            --git-sha "${{ github.sha }}" \
            --git-ref "${{ github.ref_name }}" \
            --owner "${{ github.repository_owner }}"

      - name: Validate default compose config
        run: |
          mkdir -p artifacts/ci
          docker compose --file deploy/compose/compose.yaml config > artifacts/ci/compose-default.rendered.yaml

      - name: Validate observability compose config
        run: docker compose --file deploy/compose/compose.yaml --profile observability config > artifacts/ci/compose-observability.rendered.yaml

      - name: Build backend image smoke
        run: |
          docker build \
            --file deploy/docker/backend.Dockerfile \
            --build-arg APP_BUILD_SHA="${{ github.sha }}" \
            --build-arg APP_BUILD_CREATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --tag moyuan-backend:ci .

      - name: Build frontend image smoke
        run: |
          docker build \
            --file deploy/docker/frontend.Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE=http://localhost:38000 \
            --build-arg INTERNAL_API_BASE=http://backend:38000 \
            --build-arg APP_BUILD_SHA="${{ github.sha }}" \
            --build-arg APP_BUILD_CREATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --tag moyuan-frontend:ci .

      - name: Upload deployment validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-validation-artifacts
          path: |
            artifacts/ci/compose-default.rendered.yaml
            artifacts/ci/compose-observability.rendered.yaml
            artifacts/release/release-manifest.json

      - name: Publish deployment summary
        run: |
          {
            echo "## Deployment Validation Summary"
            echo ""
            echo "- Release manifest: \`artifacts/release/release-manifest.json\`"
            echo "- Default compose render: \`artifacts/ci/compose-default.rendered.yaml\`"
            echo "- Observability compose render: \`artifacts/ci/compose-observability.rendered.yaml\`"
            echo "- Backend image smoke: \`docker build -f deploy/docker/backend.Dockerfile .\`"
            echo "- Frontend image smoke: \`docker build -f deploy/docker/frontend.Dockerfile .\`"
          } >> "$GITHUB_STEP_SUMMARY"
