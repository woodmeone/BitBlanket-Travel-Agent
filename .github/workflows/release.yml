name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v3.3.0 or 2026.04.04-rc1"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Derive release tags
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          created_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="${{ github.event.inputs.release_tag || '' }}"
          fi
          if [[ -z "${release_tag}" ]]; then
            echo "release_tag is required for manual releases." >&2
            exit 1
          fi
          backend_image="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/moyuan-travel-agent-backend"
          frontend_image="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/moyuan-travel-agent-frontend"
          backend_tags="${backend_image}:${release_tag},${backend_image}:sha-${short_sha}"
          frontend_tags="${frontend_image}:${release_tag},${frontend_image}:sha-${short_sha}"
          {
            echo "created_at=${created_at}"
            echo "release_tag=${release_tag}"
            echo "backend_image=${backend_image}"
            echo "frontend_image=${frontend_image}"
            echo "backend_tags=${backend_tags}"
            echo "frontend_tags=${frontend_tags}"
          } >> "$GITHUB_OUTPUT"

      - name: Export release manifest
        run: |
          python scripts/dev.py release-manifest \
            --git-sha "${{ github.sha }}" \
            --git-ref "${{ github.ref_name }}" \
            --release-tag "${{ steps.release_meta.outputs.release_tag }}" \
            --owner "${{ github.repository_owner }}"

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: artifacts/release/release-manifest.json

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/backend.Dockerfile
          push: true
          tags: ${{ steps.release_meta.outputs.backend_tags }}
          build-args: |
            APP_BUILD_SHA=${{ github.sha }}
            APP_BUILD_CREATED_AT=${{ steps.release_meta.outputs.created_at }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/frontend.Dockerfile
          push: true
          tags: ${{ steps.release_meta.outputs.frontend_tags }}
          build-args: |
            NEXT_PUBLIC_API_BASE=http://localhost:38000
            INTERNAL_API_BASE=http://backend:38000
            APP_BUILD_SHA=${{ github.sha }}
            APP_BUILD_CREATED_AT=${{ steps.release_meta.outputs.created_at }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Container Images

            - Backend: `${{ steps.release_meta.outputs.backend_image }}:${{ steps.release_meta.outputs.release_tag }}`
            - Frontend: `${{ steps.release_meta.outputs.frontend_image }}:${{ steps.release_meta.outputs.release_tag }}`

            ## Build Metadata

            - Git SHA: `${{ github.sha }}`
            - Built at: `${{ steps.release_meta.outputs.created_at }}`
          files: |
            artifacts/release/release-manifest.json

      - name: Publish release summary
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "- Backend image: \`${{ steps.release_meta.outputs.backend_tags }}\`"
            echo "- Frontend image: \`${{ steps.release_meta.outputs.frontend_tags }}\`"
            echo "- Release manifest: \`artifacts/release/release-manifest.json\`"
          } >> "$GITHUB_STEP_SUMMARY"
