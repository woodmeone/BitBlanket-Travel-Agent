services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.13-slim}
    ports:
      - "38000:38000"
    environment:
      - PYTHONPATH=/app
      - MOYUAN_WEB_HOST=0.0.0.0
      - MOYUAN_WEB_PORT=38000
      - MOYUAN_FRONTEND_PORT=33001
      - CORS_ORIGINS=http://localhost:33001,http://localhost:38000
      - MOYUAN_METRICS_ENABLED=true
    volumes:
      - ../config:/app/config
      - ../data:/app/data
      - ../logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:22-alpine}
        NEXT_PUBLIC_API_BASE: http://localhost:38000
        INTERNAL_API_BASE: http://backend:38000
    ports:
      - "33001:33001"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:38000
      - INTERNAL_API_BASE=http://backend:38000
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: moyuan-travel-network
