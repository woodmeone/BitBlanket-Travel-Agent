services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PYTHON_BASE_IMAGE: "${PYTHON_BASE_IMAGE:-python:3.13-slim}"
        APP_BUILD_SHA: "local-compose"
        APP_BUILD_CREATED_AT: "local"
    ports:
      - "38000:38000"
    environment:
      SHUAI_WEB_HOST: "0.0.0.0"
      SHUAI_WEB_PORT: "38000"
      SHUAI_FRONTEND_PORT: "33001"
      CORS_ORIGINS: "http://localhost:33001,http://localhost:38000"
      SHUAI_METRICS_ENABLED: "true"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: "${NODE_BASE_IMAGE:-node:22-alpine}"
        NEXT_PUBLIC_API_BASE: "http://localhost:38000"
        INTERNAL_API_BASE: "http://backend:38000"
        APP_BUILD_SHA: "local-compose"
        APP_BUILD_CREATED_AT: "local"
    ports:
      - "33001:33001"
    environment:
      NEXT_PUBLIC_API_BASE: "http://localhost:38000"
      INTERNAL_API_BASE: "http://backend:38000"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    ports:
      - "39090:9090"
    volumes:
      - ./ops/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/observability/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.2.0
    ports:
      - "33002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./ops/observability/grafana-provisioning:/etc/grafana/provisioning:ro
      - ./ops/observability/grafana-dashboard.json:/var/lib/grafana/dashboards/shuai-overview.json:ro
    depends_on:
      - prometheus
    restart: unless-stopped
